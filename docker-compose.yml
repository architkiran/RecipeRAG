# docker-compose.yml — PostgreSQL 16 with pgvector extension

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: reciperag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reciperag
      POSTGRES_PASSWORD: reciperag_dev_password
      POSTGRES_DB: reciperag
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reciperag -d reciperag"]
      interval: 5s
      timeout: 5s
      retries: 5